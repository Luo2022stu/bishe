<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索API测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            margin: 30px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        input {
            padding: 8px;
            margin: 5px;
            width: 300px;
        }
        button {
            padding: 8px 16px;
            margin: 5px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #5568d3;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 4px;
        }
        .success {
            color: green;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
    <h1>搜索API测试</h1>

    <div class="test-section">
        <h2>测试物品搜索</h2>
        <input type="text" id="itemKeyword" placeholder="输入搜索关键词(如:钱包)" />
        <button onclick="testItemSearch()">搜索物品</button>
        <div id="itemResult"></div>
    </div>

    <div class="test-section">
        <h2>测试帖子搜索</h2>
        <input type="text" id="postKeyword" placeholder="输入搜索关键词(如:钱包)" />
        <button onclick="testPostSearch()">搜索帖子</button>
        <div id="postResult"></div>
    </div>

    <div class="test-section">
        <h2>测试所有物品</h2>
        <button onclick="testAllItems()">获取所有已审核物品</button>
        <div id="allItemsResult"></div>
    </div>

    <div class="test-section">
        <h2>测试所有帖子</h2>
        <button onclick="testAllPosts()">获取所有已审核帖子</button>
        <div id="allPostsResult"></div>
    </div>

    <script>
        const API_BASE = '/api';

        async function testItemSearch() {
            const keyword = document.getElementById('itemKeyword').value.trim();
            const resultDiv = document.getElementById('itemResult');

            if (!keyword) {
                resultDiv.innerHTML = '<span class="error">请输入关键词</span>';
                return;
            }

            const url = `${API_BASE}/items/search?keyword=${encodeURIComponent(keyword)}`;
            resultDiv.innerHTML = `<p>请求URL: ${url}</p><p>请求中...</p>`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerHTML = `
                        <p class="success">请求成功! 找到 ${data.length} 条结果</p>
                        <div class="result">
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <p class="error">请求失败: ${response.status}</p>
                        <div class="result">
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">网络错误: ${error.message}</p>`;
            }
        }

        async function testPostSearch() {
            const keyword = document.getElementById('postKeyword').value.trim();
            const resultDiv = document.getElementById('postResult');

            if (!keyword) {
                resultDiv.innerHTML = '<span class="error">请输入关键词</span>';
                return;
            }

            const url = `${API_BASE}/posts?keyword=${encodeURIComponent(keyword)}`;
            resultDiv.innerHTML = `<p>请求URL: ${url}</p><p>请求中...</p>`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerHTML = `
                        <p class="success">请求成功! 找到 ${data.length} 条结果</p>
                        <div class="result">
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <p class="error">请求失败: ${response.status}</p>
                        <div class="result">
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">网络错误: ${error.message}</p>`;
            }
        }

        async function testAllItems() {
            const resultDiv = document.getElementById('allItemsResult');
            const url = `${API_BASE}/items/search?keyword=`; // 不传关键词获取所有
            resultDiv.innerHTML = `<p>请求URL: ${url}</p><p>请求中...</p>`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerHTML = `
                        <p class="success">请求成功! 共 ${data.length} 条物品</p>
                        <div class="result">
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `<p class="error">请求失败: ${response.status}</p>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">网络错误: ${error.message}</p>`;
            }
        }

        async function testAllPosts() {
            const resultDiv = document.getElementById('allPostsResult');
            const url = `${API_BASE}/posts`; // 不传参数获取所有
            resultDiv.innerHTML = `<p>请求URL: ${url}</p><p>请求中...</p>`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerHTML = `
                        <p class="success">请求成功! 共 ${data.length} 条帖子</p>
                        <div class="result">
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `<p class="error">请求失败: ${response.status}</p>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">网络错误: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
