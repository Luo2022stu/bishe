<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>连接测试 - 校园智能找寻平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #667eea;
            margin-bottom: 30px;
            text-align: center;
        }
        .status {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .button {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            text-decoration: none;
            text-align: center;
        }
        .button:hover {
            opacity: 0.9;
        }
        .button:active {
            transform: scale(0.98);
        }
        .hint {
            background: #fff3cd;
            color: #856404;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ffeeba;
            margin-top: 20px;
            font-size: 14px;
            line-height: 1.6;
        }
        .test-result {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎒 连接测试</h1>

        <div id="status" class="status info">
            正在检测网络连接...
        </div>

        <div id="results"></div>

        <a href="index.html" class="button" id="mainBtn" style="display: none;">
            进入系统首页
        </a>

        <button class="button" onclick="testConnection()">
            🔄 重新测试连接
        </button>

        <button class="button" onclick="manualAccess()">
            🔗 手动输入地址
        </button>

        <div class="hint">
            <strong>💡 提示：</strong><br>
            如果显示"连接成功"，请点击"进入系统首页"<br>
            如果显示错误，请检查：<br>
            • 手机和电脑是否在同一 WiFi<br>
            • 电脑防火墙是否允许 5000 端口<br>
            • Flask 服务器是否正在运行
        </div>
    </div>

    <script>
        const API_BASE = 'http://192.168.43.55:5000/api';

        function showStatus(message, type) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
        }

        function addResult(message, success) {
            const resultsEl = document.getElementById('results');
            const resultDiv = document.createElement('div');
            resultDiv.className = 'test-result ' + (success ? 'success' : 'error');
            resultDiv.textContent = message;
            resultsEl.appendChild(resultDiv);
        }

        async function testConnection() {
            // 清除之前的结果
            document.getElementById('results').innerHTML = '';
            document.getElementById('mainBtn').style.display = 'none';

            showStatus('正在测试连接...', 'info');

            // 测试 1: API 连接
            try {
                const response = await fetch(API_BASE + '/stats', {
                    method: 'GET',
                    cache: 'no-cache'
                });

                if (response.ok) {
                    const data = await response.json();
                    addResult('✓ API 连接成功', true);
                    addResult('✓ 服务器响应正常', true);
                    addResult(`✓ 招领物品: ${data.found_count} 条`, true);
                    addResult(`✓ 找寻物品: ${data.lost_count} 条`, true);
                    addResult(`✓ 注册用户: ${data.users_count} 人`, true);

                    showStatus('✓ 连接成功！可以正常使用', 'success');
                    document.getElementById('mainBtn').style.display = 'block';
                } else {
                    addResult('✗ API 返回错误: ' + response.status, false);
                    showStatus('✗ 服务器响应异常', 'error');
                }
            } catch (error) {
                addResult('✗ 连接失败: ' + error.message, false);
                showStatus('✗ 无法连接到服务器', 'error');
            }
        }

        function manualAccess() {
            const address = prompt('请输入服务器地址：', 'http://192.168.43.55:5000');
            if (address) {
                // 保存到 localStorage
                localStorage.setItem('serverAddress', address);
                // 更新 API_BASE
                try {
                    const url = new URL(address);
                    const apiUrl = url.origin + '/api';
                    console.log('使用自定义地址:', apiUrl);
                    alert('地址已更新，请重新测试');
                } catch (e) {
                    alert('地址格式错误，请检查');
                }
            }
        }

        // 页面加载时自动测试
        window.addEventListener('DOMContentLoaded', () => {
            // 检查是否有自定义地址
            const customAddress = localStorage.getItem('serverAddress');
            if (customAddress) {
                console.log('使用自定义地址:', customAddress);
            }
            
            // 延迟 500ms 后自动测试
            setTimeout(testConnection, 500);
        });
    </script>
</body>
</html>
