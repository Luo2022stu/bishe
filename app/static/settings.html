<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人设置 - 校园失物招领系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <button class="fixed-back-btn" onclick="history.back()">← 返回</button>
            <div class="header-content">
                <div class="header-left">
                    <h1>⚙️ 个人设置  <span class="subtitle">管理您的账户设置和隐私</span></h1>
                </div>
                <div class="user-info" id="userInfo">
                    <!-- 已登录用户信息 -->
                    <span id="userInfoText"></span>
                </div>
            </div>
        </header>

        <div class="back-to-home-btn">
            <div class="nav-icon">
                <a href="index.html" title="首页">🏠</a>
            </div>
            <div class="nav-icon">
                <a href="found.html" title="失物招领">🔍</a>
            </div>
            <div class="nav-icon">
                <a href="lost.html" title="失物找寻">📢</a>
            </div>
            <div class="nav-icon">
                <a href="forum.html" title="社区论坛">💬</a>
            </div>
            <div class="nav-icon">
                <a href="locker.html" title="智能存储柜">📦</a>
            </div>
            <div class="nav-icon">
                <a href="feedback.html" title="意见反馈">📝</a>
            </div>
        </div>

        <div class="main-content">
            <!-- 设置选项卡 -->
            <div class="settings-tabs">
                <button class="settings-tab-btn active" data-settings-tab="preferences">偏好设置</button>
                <button class="settings-tab-btn" data-settings-tab="profile-info">个人信息</button>
                <button class="settings-tab-btn" data-settings-tab="account-delete">注销账户</button>
            </div>

            <!-- 偏好设置 -->
            <div class="settings-tab-content active" id="preferences">
                <div class="section-header">
                    <h3>📝 偏好设置</h3>
                </div>
                <div class="settings-form full">
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="emailNotification">
                            <span>接收邮件通知</span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="smsNotification">
                            <span>接收短信通知</span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="showLocation">
                            <span>公开我的位置信息</span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label for="theme">主题</label>
                        <select id="theme" class="form-control">
                            <option value="light">浅色主题</option>
                            <option value="dark">深色主题</option>
                            <option value="auto">跟随系统</option>
                        </select>
                    </div>
                    <div class="settings-actions">
                        <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
                    </div>
                </div>
            </div>

            <!-- 个人信息 -->
            <div class="settings-tab-content" id="profile-info">
                <div class="section-header">
                    <h3>👤 个人信息</h3>
                </div>
                <div class="settings-form full">
                    <div class="info-section">
                        <h4>基本信息</h4>
                        <div class="info-item">
                            <span class="info-label">用户名</span>
                            <span class="info-value" id="infoUsername">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">邮箱</span>
                            <span class="info-value" id="infoEmail">-</span>
                            <button class="btn btn-secondary btn-small" onclick="editEmail()">修改</button>
                        </div>
                        <div class="info-item">
                            <span class="info-label">手机号</span>
                            <span class="info-value" id="infoPhone">-</span>
                            <button class="btn btn-secondary btn-small" onclick="editPhone()">修改</button>
                        </div>
                        <div class="info-item">
                            <span class="info-label">角色</span>
                            <span class="info-value" id="infoRole">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">注册时间</span>
                            <span class="info-value" id="infoCreated">-</span>
                        </div>
                    </div>

                    <div class="info-section">
                        <h4>权限管理</h4>
                        <div class="form-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="allowDataCollection" checked>
                                <span>允许系统收集匿名使用数据以改进服务</span>
                            </label>
                        </div>
                        <div class="form-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="allowPersonalization" checked>
                                <span>允许基于使用历史提供个性化推荐</span>
                            </label>
                        </div>
                    </div>

                    <div class="info-section">
                        <h4>数据下载</h4>
                        <p class="section-desc">您可以下载您在平台上的所有个人数据</p>
                        <button class="btn btn-secondary" onclick="downloadMyData()">下载我的数据</button>
                    </div>

                    <div class="info-section">
                        <h4>账号操作</h4>
                        <p class="section-desc">管理您的账号状态</p>
                        <div class="account-actions">
                            <button class="btn btn-warning" onclick="logout()">🚪 退出登录</button>
                            <button class="btn btn-danger" onclick="switchSettingsTab('account-delete')">🗑️ 注销账号</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 注销账户 -->
            <div class="settings-tab-content" id="account-delete">
                <div class="section-header">
                    <h3>🗑️ 注销账户</h3>
                </div>
                <div class="delete-account-section">
                    <div class="warning-box">
                        <div class="warning-icon">⚠️</div>
                        <h4>危险操作警告</h4>
                        <p class="warning-text">
                            注销账户将永久删除您的所有数据，包括：
                        </p>
                        <ul class="warning-list">
                            <li>📦 您发布的所有物品信息</li>
                            <li>💬 您发布的所有帖子</li>
                            <li>❤️ 您的所有点赞记录</li>
                            <li>👁️ 您的所有浏览历史</li>
                            <li>🔔 您的所有反馈记录</li>
                        </ul>
                        <p class="warning-text">
                            此操作<span class="highlight">不可撤销</span>，请谨慎操作！
                        </p>
                    </div>

                    <div class="delete-form">
                        <div class="form-group">
                            <label for="deleteConfirm">确认操作</label>
                            <input type="text" id="deleteConfirm" class="form-control"
                                placeholder='请输入 "DELETE" 确认删除账户' />
                        </div>
                        <div class="form-group">
                            <label for="deleteReason">删除原因（可选）</label>
                            <textarea id="deleteReason" class="form-control" rows="3"
                                placeholder="请告诉我们您注销账户的原因..."></textarea>
                        </div>
                        <button class="btn btn-danger" onclick="deleteAccount()">
                            永久注销账户
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let profileData = null;

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            checkLoginStatus();
            loadProfile();
            initSettingsTabs();
        });

        // 初始化设置选项卡
        function initSettingsTabs() {
            document.querySelectorAll('.settings-tab-btn').forEach(btn => {
                btn.addEventListener('click', () => switchSettingsTab(btn.dataset.settingsTab));
            });
        }

        // 切换设置选项卡
        function switchSettingsTab(tabId) {
            // 移除所有激活状态
            document.querySelectorAll('.settings-tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.settings-tab-content').forEach(content => content.classList.remove('active'));

            // 激活选中的选项卡
            document.querySelector(`.settings-tab-btn[data-settings-tab="${tabId}"]`).classList.add('active');
            document.getElementById(tabId).classList.add('active');

            // 如果切换到个人信息选项卡,更新UI
            if (tabId === 'profile-info') {
                updateProfileInfoUI();
            }
        }

        // 加载个人中心数据
        async function loadProfile() {
            if (!authToken) {
                document.querySelector('.main-content').innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 60px; margin-bottom: 20px;">🔒</div>
                        <p>请先登录</p>
                        <button class="btn btn-primary" onclick="window.location.href='login.html'">去登录</button>
                    </div>
                `;
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/profile`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    profileData = data;
                    updateSettingsUI(data.settings);
                    updateProfileInfoUI();
                } else if (response.status === 401) {
                    logout();
                }
            } catch (error) {
                console.error('加载失败:', error);
            }
        }

        // 更新设置界面
        function updateSettingsUI(settings) {
            if (!settings) return;

            try {
                document.getElementById('emailNotification').checked = settings.email_notification;
                document.getElementById('smsNotification').checked = settings.sms_notification;
                document.getElementById('showLocation').checked = settings.show_location;
                document.getElementById('theme').value = settings.theme;
            } catch (error) {
                console.error('更新设置UI失败:', error);
            }
        }

        // 更新个人信息UI
        function updateProfileInfoUI() {
            if (!profileData || !profileData.user) {
                return;
            }

            try {
                const user = profileData.user;
                document.getElementById('infoUsername').textContent = user.username || '-';
                document.getElementById('infoEmail').textContent = user.email || '-';
                document.getElementById('infoPhone').textContent = user.phone || '未设置';
                document.getElementById('infoRole').textContent = user.role === 'admin' ? '管理员' : '普通用户';
                document.getElementById('infoCreated').textContent = user.created_at || '-';
            } catch (error) {
                console.error('更新UI失败:', error);
            }
        }

        // 保存设置
        async function saveSettings() {
            const settings = {
                email_notification: document.getElementById('emailNotification').checked,
                sms_notification: document.getElementById('smsNotification').checked,
                show_location: document.getElementById('showLocation').checked,
                theme: document.getElementById('theme').value
            };

            try {
                const response = await fetch(`${API_BASE}/profile/settings`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(settings)
                });

                if (response.ok) {
                    alert('设置已保存');
                } else {
                    alert('保存失败');
                }
            } catch (error) {
                console.error('保存设置失败:', error);
                alert('保存失败，请检查网络');
            }
        }

        // 修改邮箱
        function editEmail() {
            const newEmail = prompt('请输入新的邮箱地址：');
            if (!newEmail) return;

            // 简单验证邮箱格式
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(newEmail)) {
                alert('邮箱格式不正确');
                return;
            }

            updateUserInfo({ email: newEmail });
        }

        // 修改手机号
        function editPhone() {
            const newPhone = prompt('请输入新的手机号：');
            if (!newPhone) return;

            // 简单验证手机号格式
            const phoneRegex = /^1[3-9]\d{9}$/;
            if (!phoneRegex.test(newPhone)) {
                alert('手机号格式不正确');
                return;
            }

            updateUserInfo({ phone: newPhone });
        }

        // 更新用户信息
        async function updateUserInfo(data) {
            if (!data) return;

            try {
                const response = await fetch(`${API_BASE}/profile/info`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert('更新成功');
                    loadProfile(); // 重新加载数据
                } else {
                    const result = await response.json();
                    alert(result.error || '更新失败');
                }
            } catch (error) {
                console.error('更新失败:', error);
                alert('更新失败，请检查网络');
            }
        }

        // 下载我的数据
        function downloadMyData() {
            if (!confirm('确定要下载您的个人数据吗？')) {
                return;
            }

            const userData = {
                exportDate: new Date().toISOString(),
                user: profileData.user,
                items: profileData.items,
                posts: profileData.posts,
                likedPosts: profileData.liked_posts,
                browseHistory: profileData.browse_history
            };

            const dataStr = JSON.stringify(userData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);

            const link = document.createElement('a');
            link.href = url;
            link.download = `my_data_${profileData.user.username}_${new Date().toISOString().split('T')[0]}.json`;
            link.click();

            URL.revokeObjectURL(url);
            alert('数据已开始下载');
        }

        // 注销账户
        async function deleteAccount() {
            const confirmText = document.getElementById('deleteConfirm').value;
            if (confirmText !== 'DELETE') {
                alert('请输入 "DELETE" 以确认删除账户');
                return;
            }

            if (!confirm('⚠️ 您即将永久注销账户，此操作不可撤销！\n\n确定要继续吗？')) {
                return;
            }

            const reason = document.getElementById('deleteReason').value;

            try {
                const response = await fetch(`${API_BASE}/profile/delete`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ reason: reason })
                });

                if (response.ok) {
                    alert('账户已成功注销');
                    logout();
                } else {
                    const result = await response.json();
                    alert(result.error || '注销失败');
                }
            } catch (error) {
                console.error('注销失败:', error);
                alert('注销失败，请检查网络');
            }
        }
    </script>
</body>
</html>
