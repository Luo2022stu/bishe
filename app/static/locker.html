<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能存储柜 - 校园失物招领系统</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="locker-styles.css">
</head>
<body>
    <div class="container">
        <header>
            <button class="fixed-back-btn" onclick="history.back()">← 返回</button>
            <div class="back-to-home-btn">
                <div class="nav-icon">
                    <a href="index.html" title="首页">🏠</a>
                </div>
                <div class="nav-icon">
                    <a href="found.html" title="失物招领">🔍</a>
                </div>
                <div class="nav-icon">
                    <a href="lost.html" title="失物找寻">📢</a>
                </div>
                <div class="nav-icon">
                    <a href="forum.html" title="社区论坛">💬</a>
                </div>
                <div class="nav-icon">
                    <a href="locker.html" title="智能存储柜">📦</a>
                </div>
                <div class="nav-icon">
                    <a href="feedback.html" title="意见反馈">📝</a>
                </div>
            </div>
            <div class="header-content">
                <div class="header-left">
                    <h1>📦 智能存储柜  <span class="subtitle">安全便捷的物品存取服务，24小时自助存取</span></h1>
                </div>
            <div class="user-info" id="userInfo">
                <button class="btn btn-secondary" onclick="window.location.href='login.html'">登录 / 注册</button>
            </div>

            <div class="user-dropdown" id="userDropdown" style="display: none;">
                <div class="user-dropdown-btn">
                    <span class="user-icon">👤</span>
                    <span class="user-name" id="userName">用户名</span>
                    <span class="dropdown-arrow">▼</span>
                </div>
                <div class="user-dropdown-menu">
                    <div class="dropdown-item" onclick="window.location.href='profile.html'">
                        <span class="dropdown-icon">👤</span>
                        <span>个人中心</span>
                    </div>
                    <div class="dropdown-item" onclick="window.location.href='chat.html'">
                        <span class="dropdown-icon">💬</span>
                        <span>聊天</span>
                        <span class="notification-badge-small" id="chatBadge" style="display: none;">0</span>
                    </div>
                    <div class="dropdown-item" onclick="window.location.href='notifications.html'">
                        <span class="dropdown-icon">🔔</span>
                        <span>消息</span>
                        <span class="notification-badge-small" id="dropdownNotificationBadge" style="display: none;">0</span>
                    </div>
                    <div class="dropdown-item" onclick="window.location.href='settings.html'">
                        <span class="dropdown-icon">⚙️</span>
                        <span>设置</span>
                    </div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item danger" onclick="logout()">
                        <span class="dropdown-icon">🚪</span>
                        <span>退出登录</span>
                    </div>

            </div>
        </header>

        <div class="main-content">
           

            <!-- 统计信息 -->
            <div class="stats-cards">
                <div class="stat-card">
                    <div class="stat-icon">🟢</div>
                    <div class="stat-number" id="availableCount">0</div>
                    <div class="stat-label">可用柜子</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🟠</div>
                    <div class="stat-number" id="occupiedCount">0</div>
                    <div class="stat-label">已占用</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📦</div>
                    <div class="stat-number" id="totalItems">0</div>
                    <div class="stat-label">存物总数</div>
                </div>
            </div>

            <!-- 快捷操作 -->
            <div class="quick-actions">
                <div class="quick-action-card" onclick="switchTab('store')">
                    <div class="quick-action-icon">📥</div>
                    <div class="quick-action-title">存物品</div>
                    <div class="quick-action-desc">快速存入物品</div>
                </div>
                <div class="quick-action-card" onclick="switchTab('pickup')">
                    <div class="quick-action-icon">📤</div>
                    <div class="quick-action-title">取物品</div>
                    <div class="quick-action-desc">输入取件码取物</div>
                </div>
            </div>

            <!-- 功能选项卡 - 使用统一样式 -->
            <div class="list-tabs">
                <button class="list-tab-btn active" data-tab="grid">柜子视图</button>
                <button class="list-tab-btn" data-tab="store">存物品</button>
                <button class="list-tab-btn" data-tab="pickup">取物品</button>
                <button class="list-tab-btn" data-tab="my-items">我的物品</button>
            </div>

            <!-- 柜子可视化视图 -->
            <div class="tab-content active" id="grid">
                <div class="locker-grid-container">
                    <div class="locker-grid-title">
                        <span>🗄️ 选择柜子</span>
                    </div>
                    <div class="locker-grid" id="lockerGrid">
                        <div class="loading">加载中...</div>
                    </div>
                    <div class="locker-legend">
                        <div class="legend-item">
                            <div class="legend-color available"></div>
                            <span>可用</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color occupied"></div>
                            <span>已占用</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color maintenance"></div>
                            <span>维护中</span>
                        </div>
                    </div>
                </div>

                <!-- 柜子详情面板 -->
                <div class="locker-detail-panel" id="lockerDetailPanel">
                    <div class="locker-detail-header">
                        <h3>柜子详情</h3>
                        <button class="locker-detail-close" onclick="closeLockerDetail()">×</button>
                    </div>
                    <div class="locker-detail-info" id="lockerDetailInfo"></div>
                    <button class="btn btn-primary btn-block" onclick="storeItemFromGrid()">存入此柜</button>
                </div>
            </div>

            <!-- 存物品 -->
            <div class="tab-content" id="store">
                <div class="locker-form">
                    <h3>存入物品</h3>
                    <div class="form-group">
                        <label for="lockerId">选择存储柜</label>
                        <select id="lockerId" class="form-control">
                            <option value="">请选择...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="itemName">物品名称 *</label>
                        <input type="text" id="itemName" class="form-control" placeholder="例如：蓝色背包">
                    </div>
                    <div class="form-group">
                        <label for="itemDescription">物品描述</label>
                        <textarea id="itemDescription" class="form-control" rows="3" placeholder="描述物品的特征（可选）"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="recipientPhone">接收人手机号 *</label>
                        <input type="tel" id="recipientPhone" class="form-control" placeholder="请输入接收人手机号">
                    </div>
                    <button class="btn btn-primary btn-block" onclick="storeItem()">存入物品</button>
                </div>

                <div class="locker-info">
                    <div class="info-card">
                        <div class="info-icon">💡</div>
                        <div class="info-content">
                            <h4>存物须知</h4>
                            <ul>
                                <li>请确保接收人手机号正确</li>
                                <li>物品存入后会生成6位取件码</li>
                                <li>请将取件码发送给接收人</li>
                                <li>取件码7天内有效</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 取物品 -->
            <div class="tab-content" id="pickup">
                <div class="locker-form">
                    <h3>取出物品</h3>
                    <div class="form-group">
                        <label for="pickupCode">输入取件码</label>
                        <input type="text" id="pickupCode" class="form-control" placeholder="请输入6位取件码" maxlength="6" pattern="[0-9]{6}">
                    </div>
                    <button class="btn btn-primary btn-block" onclick="verifyCode()">验证取件码</button>
                    <button class="scan-btn" onclick="simulateScan()">
                        <span>📷</span>
                        <span>扫码取件</span>
                    </button>
                </div>

                <div id="itemInfo" class="item-info" style="display: none;">
                    <div class="info-card success">
                        <div class="info-icon">✓</div>
                        <div class="info-content">
                            <h4>物品信息</h4>
                            <div id="itemDetails"></div>
                            <button class="btn btn-success btn-block" onclick="pickupItem()">确认取件</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 我的物品 -->
            <div class="tab-content" id="my-items">
                <div class="my-items-section">
                    <h3>我存储的物品</h3>
                    <div id="myItemsList" class="my-items-list">
                        <div class="loading">加载中...</div>
                    </div>

                    <!-- 取件历史 -->
                    <div class="pickup-history">
                        <div class="history-title">📋 取件记录</div>
                        <div class="history-timeline" id="pickupHistory">
                            <div class="loading">加载中...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let currentItem = null;
        let selectedLocker = null;
        let allLockers = [];

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            checkLoginStatus();
            loadLockerStats();
            loadAvailableLockers();
            loadMyItems();
            loadPickupHistory();

            // 绑定选项卡切换事件
            document.querySelectorAll('.list-tab-btn').forEach(btn => {
                btn.addEventListener('click', () => switchTab(btn.dataset.tab));
            });

            // 取件码输入框自动大写
            document.getElementById('pickupCode').addEventListener('input', function(e) {
                this.value = this.value.replace(/\D/g, '').slice(0, 6);
            });

            // 为存物品表单添加回车键支持
            const storeFormInputs = ['itemName', 'recipientPhone'];
            storeFormInputs.forEach(inputId => {
                const input = document.getElementById(inputId);
                if (input) {
                    input.addEventListener('keypress', function(e) {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            storeItem();
                        }
                    });
                }
            });

            // 为取件码输入框添加回车键支持
            const pickupCodeInput = document.getElementById('pickupCode');
            if (pickupCodeInput) {
                pickupCodeInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        verifyCode();
                    }
                });
            }
        });

        // 切换选项卡
        function switchTab(tabId) {
            document.querySelectorAll('.list-tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            const activeBtn = document.querySelector(`.list-tab-btn[data-tab="${tabId}"]`);
            if (activeBtn) {
                activeBtn.classList.add('active');
            }
            document.getElementById(tabId).classList.add('active');

            if (tabId === 'my-items') {
                loadMyItems();
                loadPickupHistory();
            } else if (tabId === 'grid') {
                renderLockerGrid();
            } else if (tabId === 'store') {
                loadAvailableLockers();
            }
        }

        // 加载柜子统计信息
        async function loadLockerStats() {
            try {
                const response = await fetch(`${API_BASE}/lockers/all`);
                if (response.ok) {
                    const lockers = await response.json();
                    const available = lockers.filter(l => l.status === 'available').length;
                    const occupied = lockers.filter(l => l.status === 'occupied').length;

                    document.getElementById('availableCount').textContent = available;
                    document.getElementById('occupiedCount').textContent = occupied;

                    // 获取总存物数
                    const itemsResponse = await fetch(`${API_BASE}/lockers/my-items`, {
                        headers: {
                            'Authorization': `Bearer ${authToken}`
                        }
                    });
                    if (itemsResponse.ok) {
                        const items = await itemsResponse.json();
                        const totalItems = items.filter(i => i.status === 'pending').length;
                        document.getElementById('totalItems').textContent = totalItems;
                    }
                }
            } catch (error) {
                console.error('加载统计信息失败:', error);
            }
        }

        // 渲染柜子网格
        function renderLockerGrid() {
            const container = document.getElementById('lockerGrid');

            if (!allLockers || allLockers.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无可用柜子</div>';
                return;
            }

            container.innerHTML = allLockers.map(locker => `
                <div class="locker-unit ${locker.status}" data-locker-id="${locker.id}" onclick="selectLocker(${locker.id})">
                    <div class="locker-number">${locker.locker_number}</div>
                    <div class="locker-status">${getStatusText(locker.status)}</div>
                </div>
            `).join('');
        }

        // 获取状态文本
        function getStatusText(status) {
            const statusMap = {
                'available': '可用',
                'occupied': '占用',
                'maintenance': '维护'
            };
            return statusMap[status] || status;
        }

        // 选择柜子
        function selectLocker(lockerId) {
            const locker = allLockers.find(l => l.id === lockerId);
            if (!locker || locker.status !== 'available') {
                alert('该柜子当前不可用');
                return;
            }

            // 移除之前的选择
            document.querySelectorAll('.locker-unit').forEach(unit => {
                unit.classList.remove('selected');
            });

            // 添加选择状态
            const selected = document.querySelector(`.locker-unit[data-locker-id="${lockerId}"]`);
            if (selected) {
                selected.classList.add('selected');
            }

            selectedLocker = locker;
            showLockerDetail(locker);
        }

        // 显示柜子详情
        function showLockerDetail(locker) {
            const panel = document.getElementById('lockerDetailPanel');
            const infoContainer = document.getElementById('lockerDetailInfo');

            infoContainer.innerHTML = `
                <div>
                    <div class="info-label">柜子编号</div>
                    <div class="info-value">${locker.locker_number}</div>
                </div>
                <div>
                    <div class="info-label">位置</div>
                    <div class="info-value">${locker.location}</div>
                </div>
                <div>
                    <div class="info-label">状态</div>
                    <div class="info-value" style="color: ${locker.status === 'available' ? '#4caf50' : '#ff9800'}">
                        ${getStatusText(locker.status)}
                    </div>
                </div>
                <div>
                    <div class="info-label">容量</div>
                    <div class="info-value">标准柜</div>
                </div>
            `;

            panel.classList.add('active');
        }

        // 关闭柜子详情
        function closeLockerDetail() {
            document.getElementById('lockerDetailPanel').classList.remove('active');
            document.querySelectorAll('.locker-unit').forEach(unit => {
                unit.classList.remove('selected');
            });
            selectedLocker = null;
        }

        // 从网格视图存入物品
        function storeItemFromGrid() {
            if (!selectedLocker) {
                alert('请先选择一个柜子');
                return;
            }

            document.getElementById('lockerId').value = selectedLocker.id;
            closeLockerDetail();
            switchTab('store');
        }

        // 模拟扫码
        function simulateScan() {
            // 模拟扫码功能
            const code = prompt('请输入取件码（或使用扫码枪扫描二维码）：');
            if (code) {
                document.getElementById('pickupCode').value = code.replace(/\D/g, '').slice(0, 6);
                verifyCode();
            }
        }

        // 加载可用存储柜
        async function loadAvailableLockers() {
            try {
                const response = await fetch(`${API_BASE}/lockers`);
                if (response.ok) {
                    const lockers = await response.json();
                    allLockers = lockers;

                    const select = document.getElementById('lockerId');
                    select.innerHTML = '<option value="">请选择...</option>';
                    lockers.forEach(locker => {
                        if (locker.status === 'available') {
                            select.innerHTML += `<option value="${locker.id}">${locker.locker_number} - ${locker.location}</option>`;
                        }
                    });

                    // 同时渲染网格
                    renderLockerGrid();
                }
            } catch (error) {
                console.error('加载存储柜失败:', error);
            }
        }

        // 加载取件历史
        async function loadPickupHistory() {
            if (!authToken) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/lockers/my-items`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    const items = await response.json();
                    const historyItems = items.filter(i => i.status !== 'pending');
                    renderPickupHistory(historyItems);
                }
            } catch (error) {
                console.error('加载取件历史失败:', error);
            }
        }

        // 渲染取件历史
        function renderPickupHistory(items) {
            const container = document.getElementById('pickupHistory');

            if (items.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="padding-left: 0;">
                        <p>暂无取件记录</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = items.map(item => `
                <div class="history-item">
                    <div class="history-time">${item.picked_up_at || item.expires_at}</div>
                    <div class="history-item-name">${escapeHtml(item.item_name)}</div>
                    <span class="history-item-status ${item.status}">
                        ${item.status === 'claimed' ? '已取件' : item.status === 'expired' ? '已过期' : item.status}
                    </span>
                </div>
            `).join('');
        }

        // 存入物品
        async function storeItem() {
            const lockerId = document.getElementById('lockerId').value;
            const itemName = document.getElementById('itemName').value.trim();
            const itemDescription = document.getElementById('itemDescription').value.trim();
            const recipientPhone = document.getElementById('recipientPhone').value.trim();

            // 验证必填字段
            if (!lockerId) {
                alert('请选择存储柜');
                return;
            }
            if (!itemName) {
                alert('请输入物品名称');
                return;
            }
            if (!recipientPhone) {
                alert('请输入接收人手机号');
                return;
            }

            if (!/^1[3-9]\d{9}$/.test(recipientPhone)) {
                alert('请输入正确的手机号');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/lockers`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        locker_id: parseInt(lockerId),
                        item_name: itemName,
                        description: itemDescription,
                        recipient_phone: recipientPhone
                    })
                });

                if (response.ok) {
                    const result = await response.json();
                    showPickupCodeModal(result.item);
                    // 清空表单
                    document.getElementById('itemName').value = '';
                    document.getElementById('itemDescription').value = '';
                    document.getElementById('recipientPhone').value = '';
                    document.getElementById('lockerId').value = '';
                    // 刷新统计和柜列表
                    loadLockerStats();
                    loadAvailableLockers();
                } else {
                    const error = await response.json();
                    alert(error.error || '存储失败');
                }
            } catch (error) {
                console.error('存储失败:', error);
                alert('存储失败，请检查网络连接');
            }
        }

        // 验证取件码
        async function verifyCode() {
            const pickupCode = document.getElementById('pickupCode').value.trim();

            console.log('[取件码验证] 输入的取件码:', pickupCode);
            console.log('[取件码验证] API_BASE:', API_BASE);

            if (pickupCode.length !== 6) {
                alert('请输入6位取件码');
                return;
            }

            try {
                const url = `${API_BASE}/lockers/verify`;
                console.log('[取件码验证] 请求URL:', url);
                console.log('[取件码验证] 请求体:', JSON.stringify({ pickup_code: pickupCode }));

                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ pickup_code: pickupCode })
                });

                console.log('[取件码验证] 响应状态:', response.status);

                if (response.ok) {
                    const result = await response.json();
                    console.log('[取件码验证] 响应数据:', result);
                    currentItem = result.item;
                    displayItemInfo(currentItem);
                } else {
                    const error = await response.json();
                    console.log('[取件码验证] 错误响应:', error);
                    alert(error.error || '取件码无效');
                    document.getElementById('itemInfo').style.display = 'none';
                }
            } catch (error) {
                console.error('[取件码验证] 异常:', error);
                console.error('[取件码验证] 错误堆栈:', error.stack);
                alert(`验证失败: ${error.message}`);
            }
        }

        // 显示物品信息
        function displayItemInfo(item) {
            const statusText = {
                'pending': '待取件',
                'claimed': '已取件',
                'expired': '已过期'
            };

            const html = `
                <div class="info-row">
                    <span class="info-label">物品名称：</span>
                    <span class="info-value">${escapeHtml(item.item_name)}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">存储柜号：</span>
                    <span class="info-value">${escapeHtml(item.locker_number)}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">存储位置：</span>
                    <span class="info-value">${escapeHtml(item.locker_location)}</span>
                </div>
                ${item.description ? `
                <div class="info-row">
                    <span class="info-label">物品描述：</span>
                    <span class="info-value">${escapeHtml(item.description)}</span>
                </div>
                ` : ''}
                <div class="info-row">
                    <span class="info-label">状态：</span>
                    <span class="info-value">${statusText[item.status] || item.status}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">存入时间：</span>
                    <span class="info-value">${formatTime(item.stored_at)}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">过期时间：</span>
                    <span class="info-value">${formatTime(item.expires_at)}</span>
                </div>
            `;

            document.getElementById('itemDetails').innerHTML = html;
            document.getElementById('itemInfo').style.display = 'block';
        }

        // 取出物品
        async function pickupItem() {
            if (!currentItem) return;

            if (!confirm('确认要取出物品吗？')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/lockers/pickup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ pickup_code: currentItem.pickup_code })
                });

                if (response.ok) {
                    alert('物品取出成功！');
                    document.getElementById('pickupCode').value = '';
                    document.getElementById('itemInfo').style.display = 'none';
                    currentItem = null;
                } else {
                    const error = await response.json();
                    alert(error.error || '取件失败');
                }
            } catch (error) {
                console.error('取件失败:', error);
                alert('取件失败，请检查网络连接');
            }
        }

        // 加载我的物品
        async function loadMyItems() {
            if (!authToken) {
                document.getElementById('myItemsList').innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 60px; margin-bottom: 20px;">🔒</div>
                        <p>请先登录查看我的物品</p>
                    </div>
                `;
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/lockers/my-items`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    const items = await response.json();
                    renderMyItems(items);
                }
            } catch (error) {
                console.error('加载失败:', error);
            }
        }

        // 渲染我的物品
        function renderMyItems(items) {
            const container = document.getElementById('myItemsList');

            if (items.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 60px; margin-bottom: 20px;">📭</div>
                        <p>还没有存储过物品</p>
                    </div>
                `;
                return;
            }

            const statusText = {
                'pending': '<span class="badge badge-warning">待取件</span>',
                'claimed': '<span class="badge badge-success">已取件</span>',
                'expired': '<span class="badge badge-danger">已过期</span>'
            };

            container.innerHTML = items.map(item => `
                <div class="my-item-card">
                    <div class="item-header">
                        <h4>${escapeHtml(item.item_name)}</h4>
                        ${statusText[item.status] || '<span class="badge">未知</span>'}
                    </div>
                    <div class="item-details">
                        <div class="detail-row">
                            <span class="detail-label">柜号：</span>
                            <span class="detail-value">${escapeHtml(item.locker_number)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">取件码：</span>
                            <span class="detail-value code">${escapeHtml(item.pickup_code)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">接收人：</span>
                            <span class="detail-value">${escapeHtml(item.recipient_phone)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">存入时间：</span>
                            <span class="detail-value">${formatTime(item.stored_at)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">过期时间：</span>
                            <span class="detail-value">${formatTime(item.expires_at)}</span>
                        </div>
                    </div>
                    ${item.status === 'pending' ? `
                        <div class="item-actions">
                            <button class="btn btn-danger btn-small" onclick="deleteItem(${item.id}, '${escapeHtml(item.item_name)}')">删除</button>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // 删除物品
        async function deleteItem(itemId, itemName) {
            if (!confirm(`确定要删除"${itemName}"吗？`)) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/lockers/${itemId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    alert('删除成功');
                    loadMyItems();
                } else {
                    alert('删除失败');
                }
            } catch (error) {
                console.error('删除失败:', error);
                alert('删除失败，请检查网络连接');
            }
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 显示取件码弹窗
        function showPickupCodeModal(item) {
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 10000;
                animation: fadeIn 0.3s;
            `;

            modal.innerHTML = `
                <div style="
                    background: white;
                    border-radius: 16px;
                    padding: 40px;
                    max-width: 400px;
                    width: 90%;
                    text-align: center;
                    animation: slideUp 0.3s;
                ">
                    <div style="font-size: 60px; margin-bottom: 20px;">✅</div>
                    <h2 style="color: #333; margin-bottom: 30px; font-size: 24px;">物品存储成功</h2>
                    <div style="margin: 30px 0;">
                        <div style="color: #999; margin-bottom: 10px; font-size: 14px;">取件码</div>
                        <div style="
                            font-size: 56px;
                            font-weight: 700;
                            color: #667eea;
                            letter-spacing: 10px;
                            background: linear-gradient(135deg, #f5f7fa 0%, #e8eef5 100%);
                            padding: 20px;
                            border-radius: 12px;
                        ">${item.pickup_code}</div>
                    </div>
                    <div style="color: #999; font-size: 13px; line-height: 1.8; margin-bottom: 30px;">
                        <div>📦 物品：${escapeHtml(item.item_name)}</div>
                        <div>📍 柜号：${escapeHtml(item.locker_number)}</div>
                        <div>⏰ 有效期：7天</div>
                    </div>
                    <button onclick="this.closest('div[style*=position]').remove()" style="
                        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                        border: none;
                        border-radius: 12px;
                        padding: 15px 40px;
                        color: white;
                        font-size: 16px;
                        font-weight: 600;
                        cursor: pointer;
                        width: 100%;
                    ">我已记录取件码</button>
                </div>
                <style>
                    @keyframes fadeIn {
                        from { opacity: 0; }
                        to { opacity: 1; }
                    }
                    @keyframes slideUp {
                        from {
                            opacity: 0;
                            transform: translateY(20px);
                        }
                        to {
                            opacity: 1;
                            transform: translateY(0);
                        }
                    }
                </style>
            `;

            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.remove();
                }
            });

            document.body.appendChild(modal);
        }
    </script>
</body>
</html>
