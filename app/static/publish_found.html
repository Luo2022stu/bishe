<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布失物招领 - 校园失物招领系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <button class="fixed-back-btn" onclick="history.back()">← 返回</button>
            <div class="header-content">
                <div class="header-left">
                    <h1>📝 发布失物招领</h1>
                    <p class="subtitle">发布您拾获的物品信息，帮助失物找到主人</p>
                </div>
                <div class="user-info" id="userInfo">
                    <button class="btn btn-secondary" onclick="window.location.href='login.html'">登录 / 注册</button>
                </div>
            </div>
        </header>


        <div class="main-content">
            <div class="form-section full">
                <div class="form-header">
                    <h2>📝 发布失物招领信息</h2>
                    <p class="form-desc">填写以下信息，帮助失物找到主人</p>
                </div>

                <form id="foundForm" class="item-form" onsubmit="handlePublishFound(event)">
                    <div class="form-group">
                        <label for="foundTitle">物品名称 *</label>
                        <input type="text" id="foundTitle" required placeholder="例如：黑色钱包、学生证">
                    </div>

                    <div class="form-group">
                        <label for="foundCategory">物品类别 *</label>
                        <select id="foundCategory" required>
                            <option value="">请选择类别</option>
                            <option value="证件卡片">证件卡片</option>
                            <option value="电子设备">电子设备</option>
                            <option value="书籍文具">书籍文具</option>
                            <option value="衣物配饰">衣物配饰</option>
                            <option value="钥匙">钥匙</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="foundLocation">发现地点 *</label>
                        <div class="location-input-group">
                            <input type="text" id="foundLocation" required placeholder="例如：图书馆三楼、食堂二楼">
                            <button type="button" class="btn btn-location" onclick="getLocation('found')">📍 定位</button>
                        </div>
                        <input type="hidden" id="foundLatitude">
                        <input type="hidden" id="foundLongitude">
                        <p class="form-hint">您可以手动输入地点，或使用定位功能自动获取当前位置</p>
                    </div>

                    <div class="form-group">
                        <label for="foundContact">联系方式 *</label>
                        <input type="text" id="foundContact" required placeholder="手机号或微信号">
                        <p class="form-hint">请提供真实的联系方式，方便失主与您联系</p>
                    </div>

                    <div class="form-group">
                        <label for="foundDescription">详细描述 *</label>
                        <textarea id="foundDescription" rows="5" required placeholder="请详细描述物品特征、颜色、品牌、发现时间等有助于确认物品的信息"></textarea>
                        <p class="form-hint">描述越详细，越容易帮助失主确认</p>
                    </div>

                    <div class="form-group">
                        <label>物品图片（可选）</label>
                        <div class="image-upload-container">
                            <input type="file" id="foundImage" accept="image/*" multiple onchange="previewImages(this, 'found')" style="display: none;">
                            <div class="image-upload-area" onclick="document.getElementById('foundImage').click()">
                                <div class="upload-icon">📷</div>
                                <div class="upload-text">点击上传图片</div>
                                <div class="upload-hint">支持 JPG、PNG、GIF 格式，最多5张</div>
                            </div>
                            <div id="foundImagePreview" class="image-preview-grid"></div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="window.location.href='found.html'">取消</button>
                        <button type="submit" class="btn btn-primary">发布</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // 页面加载时检查登录状态
        document.addEventListener('DOMContentLoaded', () => {
            checkLoginStatus();
        });

        // 发布成功后跳转回列表页
        const originalPublish = window.handlePublishFound;
        window.handlePublishFound = async function(e) {
            await originalPublish(e);
            // 延迟跳转以等待数据库更新
            setTimeout(() => window.location.href = 'found.html', 1000);
        };
    </script>
</body>
</html>
