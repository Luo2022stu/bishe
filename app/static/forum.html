<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园失物招领系统 - 社区交流</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="report-styles.css">
</head>
<body>
    <div class="container">
        <header>
            <button class="fixed-back-btn" onclick="history.back()">← 返回</button>
            <div class="back-to-home-btn">
                <div class="nav-icon">
                    <a href="index.html" title="首页">🏠</a>
                </div>
                <div class="nav-icon">
                    <a href="found.html" title="失物招领">🔍</a>
                </div>
                <div class="nav-icon">
                    <a href="lost.html" title="失物找寻">📢</a>
                </div>
                <div class="nav-icon">
                    <a href="forum.html" title="社区论坛">💬</a>
                </div>
                <div class="nav-icon">
                    <a href="locker.html" title="智能存储柜">📦</a>
                </div>
                <div class="nav-icon">
                    <a href="feedback.html" title="意见反馈">📝</a>
                </div>
            </div>
            <div class="header-content">
                <div class="header-left">
                    <h1>💬 社区交流  <span class="subtitle">分享经验、提供建议、互相帮助</span></h1>
                </div>
            <div class="user-info" id="userInfo">
                <button class="btn btn-secondary" onclick="window.location.href='login.html'">登录 / 注册</button>
            </div>

            <div class="user-dropdown" id="userDropdown" style="display: none;">
                <div class="user-dropdown-btn">
                    <span class="user-icon">👤</span>
                    <span class="user-name" id="userName">用户名</span>
                    <span class="dropdown-arrow">▼</span>
                </div>
                <div class="user-dropdown-menu">
                    <div class="dropdown-item" onclick="window.location.href='profile.html'">
                        <span class="dropdown-icon">👤</span>
                        <span>个人中心</span>
                    </div>
                    <div class="dropdown-item" onclick="window.location.href='chat.html'">
                        <span class="dropdown-icon">💬</span>
                        <span>聊天</span>
                        <span class="notification-badge-small" id="chatBadge" style="display: none;">0</span>
                    </div>
                    <div class="dropdown-item" onclick="window.location.href='notifications.html'">
                        <span class="dropdown-icon">🔔</span>
                        <span>消息</span>
                        <span class="notification-badge-small" id="dropdownNotificationBadge" style="display: none;">0</span>
                    </div>
                    <div class="dropdown-item" onclick="window.location.href='settings.html'">
                        <span class="dropdown-icon">⚙️</span>
                        <span>设置</span>
                    </div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item danger" onclick="logout()">
                        <span class="dropdown-icon">🚪</span>
                        <span>退出登录</span>
                    </div>

            </div>
        </header>

        <div class="main-content">
            <!-- 操作栏 -->
            <div class="forum-actions">
                
                <div class="forum-filters">
                    <select id="categoryFilter" onchange="filterPosts()">
                        <option value="">全部分类</option>
                        <option value="交流">交流</option>
                        <option value="建议">建议</option>
                        <option value="求助">求助</option>
                    </select>
                    <input type="text" id="searchInput" placeholder="搜索帖子..." onkeypress="handleSearchKeypress(event)">
                    <button class="btn btn-secondary" onclick="searchPosts()">搜索</button>
                </div>
                <button class="btn btn-primary" id="createPostBtn" onclick="showCreatePostModal()">+ 发布新帖</button>
            </div>

            <!-- 全部帖子 -->
            <div class="all-posts-section">
                <div class="section-header">
                    <h2>📝 全部帖子</h2>
                </div>
                <div class="posts-container" id="postsContainer">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 发布帖子弹窗 -->
    <div class="modal" id="createPostModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>发布新帖</h2>
                <button class="modal-close" onclick="closeCreatePostModal()">×</button>
            </div>
            <form id="createPostForm" onsubmit="handleCreatePost(event)">
                <div class="form-group">
                    <label>标题 *</label>
                    <input type="text" id="postTitle" required placeholder="请输入帖子标题">
                </div>
                <div class="form-group">
                    <label>分类 *</label>
                    <select id="postCategory" required>
                        <option value="交流">交流</option>
                        <option value="建议">建议</option>
                        <option value="求助">求助</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>内容 *</label>
                    <textarea id="postContent" required rows="6" placeholder="请输入帖子内容"></textarea>
                </div>
                <div class="form-group">
                    <label>图片（可选）</label>
                    <input type="file" id="postImage" accept="image/*" />
                    <small style="color: #999;">支持 JPG、PNG、WEBP 等格式，图片大小不超过 5MB</small>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeCreatePostModal()">取消</button>
                    <button type="submit" class="btn btn-primary">发布</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            console.log('论坛页面加载完成');
            checkLoginStatus();
            loadPosts();
        });
    </script>
</body>
</html>
