<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI识别结果 - 校园智能找寻平台</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="smart-match-styles.css">
    <style>
        .ai-result-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .ai-result-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .ai-result-header h1 {
            color: #333;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .ai-result-header p {
            color: #666;
            font-size: 0.95em;
        }

        .image-section {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }

        .uploaded-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            border: 3px solid #667eea;
        }

        .recognition-section {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
        }

        .recognition-section h2 {
            color: #333;
            font-size: 1.5em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .recognition-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .recognition-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .recognition-label {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }

        .recognition-value {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .search-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 2px dashed #e0e0e0;
        }

        .action-btn {
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }

        .action-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .action-btn.secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .action-btn.secondary:hover {
            background: #667eea;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #667eea;
        }

        .loading-spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 4px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            border-radius: 8px;
            padding: 20px;
            color: #c33;
            text-align: center;
        }

        .suggestion-box {
            background: #fff9e6;
            border-left: 4px solid #ffc107;
            padding: 15px 20px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .suggestion-box h4 {
            margin: 0 0 10px 0;
            color: #856404;
            font-size: 16px;
        }

        .suggestion-box p {
            margin: 0;
            color: #666;
            font-size: 14px;
        }

        .upload-new-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .upload-new-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <!-- 纵向侧边导航栏 -->
    <nav class="side-nav">
        <a href="index.html" class="side-nav-item" title="首页">🏠</a>
        <a href="found.html" class="side-nav-item" title="失物招领">🔍</a>
        <a href="lost.html" class="side-nav-item" title="失物找寻">📢</a>
        <a href="forum.html" class="side-nav-item" title="社区交流">💬</a>
        <a href="smart-match.html" class="side-nav-item" title="智能匹配">🎯</a>
        <a href="search-results.html" class="side-nav-item active" title="AI图片识别">🤖</a>
    </nav>

    <div class="container has-side-nav">
        <a href="search-results.html" class="back-to-home-btn" title="返回搜索">←</a>

        <div class="ai-result-container">
            <div class="ai-result-header">
                <h1>🤖 AI图片识别结果</h1>
                <p>系统已成功识别您上传的图片</p>
            </div>

            <div id="loadingSection" class="loading">
                <div class="loading-spinner"></div>
                <p>AI正在识别图片...</p>
            </div>

            <div id="errorSection" style="display: none;">
                <div class="error-message">
                    <h3>❌ 识别失败</h3>
                    <p id="errorMessage">请稍后重试</p>
                    <a href="search-results.html" class="upload-new-btn">返回搜索</a>
                </div>
            </div>

            <div id="resultContent" style="display: none;">
                <!-- 上传的图片 -->
                <div class="image-section">
                    <img id="uploadedImage" class="uploaded-image" alt="上传的图片">
                </div>

                <!-- 识别结果 -->
                <div class="recognition-section">
                    <h2>🎯 识别结果</h2>
                    <div class="recognition-grid">
                        <div class="recognition-item">
                            <div class="recognition-label">📷 识别类别</div>
                            <div class="recognition-value" id="recogCategory">-</div>
                        </div>
                        <div class="recognition-item">
                            <div class="recognition-label">🔧 识别服务</div>
                            <div class="recognition-value" id="recogService">-</div>
                        </div>
                        <div class="recognition-item">
                            <div class="recognition-label">🎯 置信度</div>
                            <div class="recognition-value" id="recogConfidence">-</div>
                        </div>
                    </div>

                    <!-- 详细描述区域 -->
                    <div style="margin-top: 25px; padding: 20px; background: linear-gradient(135deg, #f0f4ff 0%, #f9f0ff 100%); border-radius: 10px; border-left: 4px solid #667eea;">
                        <div style="font-weight: 600; color: #667eea; margin-bottom: 12px; font-size: 16px;">📝 详细描述</div>
                        <div id="recogDescription" style="color: #333; line-height: 1.8; font-size: 15px;">-</div>
                    </div>

                    <!-- 简要描述 -->
                    <div style="margin-top: 15px; padding: 15px; background: #fff9e6; border-radius: 8px; border-left: 4px solid #ffc107;">
                        <div style="font-size: 13px; color: #856404; margin-bottom: 5px; font-weight: 500;">🔍 核心关键词</div>
                        <div id="recogSimpleDescription" style="color: #333; font-size: 14px;">-</div>
                    </div>

                    <!-- OCR识别文字 -->
                    <div id="ocrSection" style="margin-top: 15px; padding: 15px; background: #e8f5e9; border-radius: 8px; border-left: 4px solid #4caf50; display: none;">
                        <div style="font-size: 13px; color: #2e7d32; margin-bottom: 5px; font-weight: 500;">📄 识别到的文字</div>
                        <div id="ocrText" style="color: #333; font-size: 14px; line-height: 1.6;"></div>
                    </div>

                    <div class="search-actions">
                        <button class="action-btn primary" onclick="searchWithDescription()">
                            🔍 使用详细描述搜索
                        </button>
                        <button class="action-btn secondary" onclick="searchWithSimpleDescription()">
                            📌 使用关键词搜索
                        </button>
                        <button class="action-btn secondary" onclick="searchWithCategory()">
                            📂 使用类别搜索
                        </button>
                        <a href="search-results.html" class="action-btn secondary">
                            🔄 重新上传
                        </a>
                    </div>

                    <div class="suggestion-box" id="suggestionBox" style="display: none;">
                        <h4>💡 建议</h4>
                        <p id="suggestionText">您可以尝试使用识别结果中的关键词进行搜索</p>
                    </div>
                </div>

                <!-- 匹配的物品 -->
                <div id="matchedItemsSection" style="display: none;">
                    <div class="results-title" style="margin-bottom: 20px;">
                        🔥 匹配的物品 <span id="matchCount" class="result-count">(0)</span>
                    </div>
                    <div id="matchedItems" class="matched-items">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let recognitionResult = null;
        let imageData = null;

        document.addEventListener('DOMContentLoaded', function() {
            checkLoginStatus();
            loadRecognitionResult();
        });

        function loadRecognitionResult() {
            // 从 sessionStorage 获取识别结果
            const savedResult = sessionStorage.getItem('aiRecognitionResult');
            const savedImage = sessionStorage.getItem('aiRecognitionImage');

            if (savedResult) {
                recognitionResult = JSON.parse(savedResult);
                displayResult();

                if (savedImage) {
                    document.getElementById('uploadedImage').src = savedImage;
                }

                // 显示匹配的物品
                loadMatchedItems();
            } else {
                showError('未找到识别结果，请重新上传图片');
            }
        }

        function displayResult() {
            document.getElementById('loadingSection').style.display = 'none';
            document.getElementById('resultContent').style.display = 'block';

            document.getElementById('recogCategory').textContent = recognitionResult.category || '未识别';
            document.getElementById('recogDescription').textContent = recognitionResult.description || '无描述';
            document.getElementById('recogSimpleDescription').textContent = recognitionResult.simple_description || recognitionResult.description || '无描述';
            document.getElementById('recogService').textContent = recognitionResult.service || 'AI服务';

            // 显示置信度
            const confidence = recognitionResult.confidence || 0;
            const confidencePercent = Math.round(confidence * 100);
            document.getElementById('recogConfidence').textContent = `${confidencePercent}%`;

            // 显示OCR识别的文字
            if (recognitionResult.ocr_text) {
                document.getElementById('ocrSection').style.display = 'block';
                document.getElementById('ocrText').textContent = recognitionResult.ocr_text;
            }

            // 显示建议
            const description = recognitionResult.description;
            if (description && description !== '无描述') {
                document.getElementById('suggestionBox').style.display = 'block';
                document.getElementById('suggestionText').textContent =
                    `AI已为您生成详细描述，建议使用"使用详细描述搜索"功能进行查找`;
            }
        }

        async function loadMatchedItems() {
            if (!recognitionResult || !recognitionResult.description) return;

            try {
                // 使用搜索API来查找匹配的物品，而不是使用match-items接口
                const keyword = recognitionResult.description;
                const response = await fetch(`/api/items/search?keyword=${encodeURIComponent(keyword)}`);

                if (response.ok) {
                    const items = await response.json();
                    if (items && items.length > 0) {
                        document.getElementById('matchedItemsSection').style.display = 'block';
                        document.getElementById('matchCount').textContent = `(${items.length})`;

                        // 为每个物品计算匹配分数
                        const matchedItems = items.map(item => {
                            let score = 0;
                            const matchReasons = [];

                            // 类别匹配
                            if (recognitionResult.category && item.category === recognitionResult.category) {
                                score += 50;
                                matchReasons.push(`类别匹配: ${recognitionResult.category}`);
                            }

                            // 标题关键词匹配
                            const titleLower = item.title.toLowerCase();
                            const descLower = recognitionResult.description.toLowerCase();
                            const descWords = new Set(descLower.split());
                            const titleWords = new Set(titleLower.split());
                            const commonWords = [...descWords].filter(word => titleWords.has(word));

                            if (commonWords.length > 0) {
                                score += 30;
                                matchReasons.push(`关键词匹配: ${commonWords.join(', ')}`);
                            }

                            // 描述匹配
                            if (item.description) {
                                const itemDescLower = item.description.toLowerCase();
                                if (descLower && itemDescLower.includes(descLower)) {
                                    score += 20;
                                    matchReasons.push('描述相似');
                                }
                            }

                            // 确保匹配度不低于0%
                            if (score < 5) {
                                score = 5;  // 最低5%的匹配度,避免显示0%
                                matchReasons.push('系统推荐');
                            }

                            return {
                                item: item,
                                score: score,
                                match_reasons: matchReasons
                            };
                        }); // 移除筛选条件,显示所有匹配的物品,即使匹配度较低

                        // 按匹配分数降序排序
                        matchedItems.sort((a, b) => b.score - a.score);

                        displayMatchedItems(matchedItems);
                    }
                }
            } catch (error) {
                console.error('加载匹配物品失败:', error);
            }
        }

        function displayMatchedItems(items) {
            const container = document.getElementById('matchedItems');
            container.innerHTML = items.map(match => {
                const item = match.item;
                const typeText = item.type === 'found' ? '招领' : '寻物';
                const typeClass = item.type;
                return `
                    <div class="match-card" onclick="viewItemDetail(${item.id})">
                        <div class="match-header">
                            <div class="match-title">${escapeHtml(item.title)}</div>
                            <div class="match-score">匹配度: ${match.score}%</div>
                        </div>
                        <div>
                            <span class="match-type ${typeClass}">${typeText}</span>
                        </div>
                        <div class="match-meta">
                            <span>📍 ${escapeHtml(item.location || '-')}</span>
                            <span>📂 ${escapeHtml(item.category || '-')}</span>
                            <span>👤 ${escapeHtml(item.username || '-')}</span>
                        </div>
                        <p style="color: #666; font-size: 14px; margin: 10px 0;">${escapeHtml(item.description || '')}</p>
                        <div class="match-reasons">
                            ${match.match_reasons.map(reason =>
                                `<span class="reason-badge">${escapeHtml(reason)}</span>`
                            ).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function searchWithDescription() {
            if (!recognitionResult || !recognitionResult.description) {
                alert('识别结果中没有描述信息');
                return;
            }

            const keyword = recognitionResult.description;
            window.location.href = `search-results.html?keyword=${encodeURIComponent(keyword)}&source=ai`;
        }

        function searchWithSimpleDescription() {
            if (!recognitionResult || !recognitionResult.simple_description) {
                alert('识别结果中没有关键词信息');
                return;
            }

            const keyword = recognitionResult.simple_description;
            window.location.href = `search-results.html?keyword=${encodeURIComponent(keyword)}&source=ai`;
        }

        function searchWithCategory() {
            if (!recognitionResult || !recognitionResult.category) {
                alert('识别结果中没有类别信息');
                return;
            }

            const keyword = recognitionResult.category;
            window.location.href = `search-results.html?keyword=${encodeURIComponent(keyword)}&source=ai`;
        }

        function viewItemDetail(itemId) {
            window.location.href = `item-detail.html?id=${itemId}`;
        }

        function showError(message) {
            document.getElementById('loadingSection').style.display = 'none';
            document.getElementById('errorSection').style.display = 'block';
            document.getElementById('errorMessage').textContent = message;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
