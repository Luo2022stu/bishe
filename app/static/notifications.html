<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息通知 - 校园失物招领系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <button class="fixed-back-btn" onclick="history.back()">← 返回</button>
            <div class="header-content">
                <div class="header-left">
                    <h1>🔔 消息通知  <span class="subtitle">查看您的所有消息通知</span></h1>
                </div>
                <div class="user-info" id="userInfo">
                    <!-- 已登录用户信息 -->
                    <span id="userInfoText"></span>
                </div>
            </div>
        </header>


        <div class="main-content">
            <!-- 通知过滤器和操作栏 -->
            <div class="notification-filter-section">
                <div class="notification-filter">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn" data-filter="unread">未读</button>
                    <button class="filter-btn" data-filter="comment">评论</button>
                    <button class="filter-btn" data-filter="like">点赞</button>
                    <button class="filter-btn" data-filter="reply">回复</button>
                    <button class="filter-btn" data-filter="system">系统</button>
                </div>
                <div class="notification-actions">
                    <button class="btn btn-secondary btn-small" onclick="markAllAsRead()">
                        <span>✓</span> 全部已读
                    </button>
                </div>
            </div>

            <!-- 通知列表 -->
            <div id="notificationsList" class="notifications-container">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 系统通知详情弹窗 -->
    <div class="modal" id="systemNotificationModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>系统通知详情</h2>
                <button class="modal-close" onclick="closeSystemNotificationModal()">×</button>
            </div>
            <div class="system-notification-detail" id="systemNotificationDetailContent">
                <!-- 动态填充 -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let currentFilter = 'all';
        let allNotifications = [];

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', async () => {
            await checkLoginStatus();
            filterNotificationButtons();
            loadNotifications();
            setupFilterButtons();

            // 检查是否有待打开的系统通知（从首页推送点击跳转过来的）
            const pendingNotificationId = localStorage.getItem('pendingNotificationId');
            if (pendingNotificationId) {
                console.log('检测到待打开的通知ID:', pendingNotificationId);
                // 清除存储的ID
                localStorage.removeItem('pendingNotificationId');
                // 延迟加载通知详情，确保通知列表已加载
                setTimeout(() => {
                    openSystemNotificationDetail(parseInt(pendingNotificationId));
                }, 500);
            }
        });

        // 根据用户角色过滤通知按钮
        function filterNotificationButtons() {
            if (currentUser) {
                if (currentUser.role === 'admin') {
                    // 管理员只显示待审核通知、反馈通知和系统通知
                    document.querySelectorAll('.filter-btn').forEach(btn => {
                        if (btn.dataset.filter === 'pending_audit' || btn.dataset.filter === 'feedback' || btn.dataset.filter === 'system' || btn.dataset.filter === 'all' || btn.dataset.filter === 'unread') {
                            btn.style.display = 'inline-block';
                        } else {
                            btn.style.display = 'none';
                        }
                    });
                }
            }
        }

        // 设置过滤器按钮
        function setupFilterButtons() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    // 移除所有激活状态
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    // 激活当前按钮
                    btn.classList.add('active');
                    // 设置过滤器
                    currentFilter = btn.dataset.filter;
                    // 重新渲染
                    renderNotifications();
                });
            });
        }

        // 加载通知列表
        async function loadNotifications() {
            if (!authToken) {
                document.getElementById('notificationsList').innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 60px; margin-bottom: 20px;">🔒</div>
                        <p>请先登录查看通知</p>
                        <button class="btn btn-primary" onclick="window.location.href='login.html'">去登录</button>
                    </div>
                `;
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/notifications`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    // 根据用户角色过滤通知
                    if (currentUser && currentUser.role === 'admin') {
                        // 管理员只看待审核通知、反馈通知和系统通知
                        allNotifications = data.notifications.filter(n => n.type === 'pending_audit' || n.type === 'feedback' || n.type === 'system');
                    } else {
                        // 普通用户看所有通知，但将反馈、禁言、待审核类型归纳到系统通知中
                        allNotifications = data.notifications.map(n => {
                            // 将反馈、禁言、待审核类型改为系统通知类型
                            if (n.type === 'feedback' || n.type === 'mute' || n.type === 'pending_audit') {
                                return { ...n, type: 'system' };
                            }
                            return n;
                        });
                    }
                    console.log('通知数据:', allNotifications);
                    renderNotifications();
                } else if (response.status === 401) {
                    logout();
                }
            } catch (error) {
                console.error('加载通知失败:', error);
                document.getElementById('notificationsList').innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 60px; margin-bottom: 20px;">❌</div>
                        <p>加载失败，请稍后重试</p>
                    </div>
                `;
            }
        }

        // 渲染通知列表
        function renderNotifications() {
            const container = document.getElementById('notificationsList');

            // 根据过滤器筛选
            let filteredNotifications = allNotifications;
            if (currentFilter === 'unread') {
                filteredNotifications = allNotifications.filter(n => !n.is_read);
            } else if (currentFilter !== 'all') {
                filteredNotifications = allNotifications.filter(n => n.type === currentFilter);
            }

            if (filteredNotifications.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 60px; margin-bottom: 20px;">📬</div>
                        <p>${currentFilter === 'all' ? '暂无通知' : '该类型暂无通知'}</p>
                    </div>
                `;
                return;
            }


            const typeIcons = {
                'comment': '💬',
                'like': '❤️',
                'reply': '↩️',
                'feedback': '📝',
                'mute': '🔇',
                'audit': '✅',
                'pending_audit': '📋',
                'system': '📢',
                'friend_request': '👋',
                'friend_accepted': '✅'
            };
            const typeLabels = {
                'comment': '评论通知',
                'like': '点赞通知',
                'reply': '回复通知',
                'feedback': '反馈回复',
                'mute': '禁言通知',
                'audit': '审核通知',
                'pending_audit': '待审核通知',
                'system': '系统通知',
                'friend_request': '好友申请',
                'friend_accepted': '好友已添加'
            };

            container.innerHTML = filteredNotifications.map(notif => {
                const icon = typeIcons[notif.type] || '📢';
                const typeLabel = typeLabels[notif.type] || '通知';
                const readClass = notif.is_read ? 'notification-card-read' : 'notification-card-unread';

                // 所有通知都可点击，根据类型跳转到不同页面
                return `
                    <div class="notification-card ${readClass} notification-card-clickable" data-id="${notif.id}" data-type="${notif.type}" onclick="handleNotificationClickById(${notif.id})">
                        <div class="notification-card-header">
                            <div class="notification-card-icon">${icon}</div>
                            <div class="notification-card-info">
                                <div class="notification-card-title">${escapeHtml(notif.title)}</div>
                                <div class="notification-card-type">${typeLabel}</div>
                            </div>
                        </div>
                        <div class="notification-card-content">${escapeHtml(notif.content)}</div>
                        <div class="notification-card-footer">
                            <span class="notification-card-time">${formatTime(notif.created_at)}</span>
                            <span class="notification-hint">点击查看详情</span>
                            ${!notif.is_read ? `
                                <button class="btn btn-small btn-primary" onclick="event.stopPropagation(); markAsRead(${notif.id})">标记已读</button>
                            ` : '<span class="notification-read-badge">已读</span>'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 根据ID处理通知点击
        async function handleNotificationClickById(notificationId) {
            const notification = allNotifications.find(n => n.id === notificationId);
            if (!notification) {
                console.error('未找到通知:', notificationId);
                return;
            }
            await handleNotificationClick(notification);
        }

        // 处理通知点击
        async function handleNotificationClick(notification) {
            console.log('处理通知点击:', notification);

            // 标记为已读
            if (!notification.is_read) {
                await markAsRead(notification.id);
            }

            // 根据通知类型跳转
            switch(notification.type) {
                case 'like':
                case 'comment':
                    // 点赞、评论通知，直接跳转到帖子详情页
                    if (notification.related_id && notification.related_type === 'post') {
                        window.location.href = `post-detail.html?id=${notification.related_id}`;
                    } else {
                        window.location.href = `forum.html`;
                    }
                    break;
                case 'reply':
                    // 回复通知，跳转到帖子详情页
                    if (notification.related_id) {
                        // 直接跳转到帖子详情页，通过URL参数传递帖子ID
                        fetchCommentAndNavigateToPostDetail(notification.related_id);
                    } else {
                        window.location.href = `forum.html`;
                    }
                    break;
                case 'feedback':
                    // 反馈通知，管理员跳转到管理员后台，普通用户跳转到反馈页面
                    if (currentUser && currentUser.role === 'admin') {
                        window.location.href = `admin.html#feedbacks`;
                    } else {
                        window.location.href = `feedback.html`;
                    }
                    break;
                case 'mute':
                    // 禁言通知，跳转到个人中心查看禁言状态
                    window.location.href = `profile.html`;
                    break;
                case 'audit':
                    // 审核通知，根据类型跳转到物品详情页或帖子详情页
                    if (notification.related_type === 'post') {
                        window.location.href = `post-detail.html?id=${notification.related_id}`;
                    } else if (notification.related_type === 'item') {
                        // 物品详情页面，跳转到物品详情页
                        window.location.href = `item-detail.html?id=${notification.related_id}`;
                    } else {
                        window.location.href = `index.html`;
                    }
                    break;
                case 'pending_audit':
                    // 待审核通知，管理员跳转到具体审核页面
                    if (currentUser && currentUser.role === 'admin') {
                        if (notification.related_type === 'post') {
                            // 帖子审核，跳转到管理员后台帖子页面
                            window.location.href = `admin.html#posts`;
                        } else if (notification.related_type === 'item') {
                            // 物品审核，跳转到管理员后台物品页面
                            window.location.href = `admin.html#items`;
                        } else {
                            // 其他类型，跳转到管理员后台首页
                            window.location.href = `admin.html`;
                        }
                    } else {
                        // 普通用户的审核结果通知
                        if (notification.related_type === 'post') {
                            window.location.href = `post-detail.html?id=${notification.related_id}`;
                        } else if (notification.related_type === 'item') {
                            window.location.href = `item-detail.html?id=${notification.related_id}`;
                        } else {
                            window.location.href = `index.html`;
                        }
                    }
                    break;
                case 'friend_request':
                    // 好友申请通知，跳转到聊天页面查看待处理申请
                    window.location.href = `chat.html`;
                    break;
                case 'friend_accepted':
                    // 好友申请通过，跳转到聊天界面
                    if (notification.related_id) {
                        // 获取好友关系信息
                        fetchFriendshipAndNavigateToChat(notification.related_id);
                    } else {
                        window.location.href = `chat.html`;
                    }
                    break;
                case 'system':
                    // 系统通知，显示详情弹窗
                    if (notification.related_id && notification.related_type === 'system_notification') {
                        openSystemNotificationDetail(notification.related_id);
                    } else {
                        alert('无法找到通知详情');
                    }
                    break;
                default:
                    // 默认跳转到首页
                    window.location.href = `index.html`;
                    break;
            }
        }

        // 标记单个通知为已读
        async function markAsRead(notificationId) {
            try {
                const response = await fetch(`${API_BASE}/notifications/${notificationId}/read`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    // 不重新加载列表，避免影响跳转
                    return true;
                }
                return false;
            } catch (error) {
                console.error('标记失败:', error);
                return false;
            }
        }

        // 标记所有通知为已读
        async function markAllAsRead() {
            if (!confirm('确定要将所有通知标记为已读吗？')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/notifications/read-all`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    loadNotifications();
                    alert('已全部标记为已读');
                } else {
                    alert('操作失败，请稍后重试');
                }
            } catch (error) {
                console.error('标记失败:', error);
                alert('操作失败，请稍后重试');
            }
        }

        // 格式化时间(相对时间)
        function formatTime(timeString) {
            const date = new Date(timeString);
            const now = new Date();
            const diff = now - date;

            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 1) return '刚刚';
            if (minutes < 60) return `${minutes}分钟前`;
            if (hours < 24) return `${hours}小时前`;
            if (days < 7) return `${days}天前`;

            return date.toLocaleDateString('zh-CN');
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 打开系统通知详情
        async function openSystemNotificationDetail(notificationId) {
            try {
                // 获取系统通知详情
                const response = await fetch(`${API_BASE}/system-notifications/${notificationId}`);
                if (response.ok) {
                    const notification = await response.json();
                    // 显示详情弹窗
                    const modal = document.getElementById('systemNotificationModal');
                    const content = document.getElementById('systemNotificationDetailContent');

                    content.innerHTML = `
                        <div class="notification-detail-header">
                            <span class="notification-tag">${escapeHtml(notification.tag || '公告')}</span>
                            <h3 class="notification-detail-title">${escapeHtml(notification.title)}</h3>
                            <p class="notification-detail-date">${formatDate(notification.created_at)}</p>
                        </div>
                        <div class="notification-detail-body">
${escapeHtml(notification.content)}
                        </div>
                    `;

                    modal.classList.add('show');
                } else {
                    alert('加载通知详情失败');
                }
            } catch (error) {
                console.error('加载通知详情失败:', error);
                alert('加载通知详情失败');
            }
        }

        // 关闭系统通知详情弹窗
        function closeSystemNotificationModal() {
            const modal = document.getElementById('systemNotificationModal');
            modal.classList.remove('show');
        }

        // 格式化日期
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // 获取评论并跳转到帖子详情页
        async function fetchCommentAndNavigateToPostDetail(commentId) {
            try {
                const response = await fetch(`${API_BASE}/comments/${commentId}`);
                if (response.ok) {
                    const comment = await response.json();
                    if (comment.post_id) {
                        // 直接跳转到帖子详情页
                        window.location.href = `post-detail.html?id=${comment.post_id}`;
                    } else {
                        window.location.href = `forum.html`;
                    }
                } else {
                    window.location.href = `forum.html`;
                }
            } catch (error) {
                console.error('获取评论信息失败:', error);
                window.location.href = `forum.html`;
            }
        }

        // 获取好友关系并跳转到聊天界面
        async function fetchFriendshipAndNavigateToChat(friendshipId) {
            try {
                const response = await fetch(`${API_BASE}/friendships/${friendshipId}`);
                if (response.ok) {
                    const friendship = await response.json();
                    // 获取对方的用户ID（不是当前用户）
                    const currentUserId = currentUser.id;
                    const friendId = friendship.user_id === currentUserId ? friendship.friend_id : friendship.user_id;

                    // 跳转到聊天界面，携带好友ID
                    window.location.href = `chat.html#chat-${friendId}`;
                } else {
                    window.location.href = `chat.html`;
                }
            } catch (error) {
                console.error('获取好友关系失败:', error);
                window.location.href = `chat.html`;
            }
        }
    </script>
</body>
</html>
